services:
  # ==========================================
  # INFRAESTRUCTURA Y BASES DE DATOS
  # ==========================================
  
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: c5_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - c5_network

  redis:
    image: redis:alpine
    container_name: c5_redis
    ports:
      - "6379:6379"
    networks:
      - c5_network

  postgres-primary:
    image: bitnami/postgresql:latest
    container_name: c5_postgres_primary
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_USERNAME=c5_admin
      - POSTGRESQL_PASSWORD=c5_secret
      - POSTGRESQL_DATABASE=c5_alertas
    ports:
      - "5432:5432"
    networks:
      - c5_network
    volumes:
      - pg_primary_data:/bitnami/postgresql

  postgres-replica:
    image: bitnami/postgresql:latest
    container_name: c5_postgres_replica
    depends_on:
      - postgres-primary
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_MASTER_HOST=postgres-primary
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_PASSWORD=c5_secret
    ports:
      - "5433:5432"
    networks:
      - c5_network
    volumes:
      - pg_replica_data:/bitnami/postgresql

  # ==========================================
  # BALANCEADOR DE CARGA
  # ==========================================
  
  nginx-lb:
    image: nginx:alpine
    container_name: c5_nginx_lb
    ports:
      - "8080:80"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - recepcion
    networks:
      - c5_network

  # ==========================================
  # MICROSERVICIOS (MODO DESARROLLO / LIVE-RELOAD)
  # ==========================================

  recepcion:
    image: node:20-alpine
    container_name: c5_recepcion
    working_dir: /app
    volumes:
      - ./services/recepcion:/app
      - /app/node_modules
    command: sh -c "npm install && node index.js"
    networks:
      - c5_network
    environment:
      - MQTT_BROKER=mqtt://mosquitto:1883
      - GRPC_GEOLOCALIZACION_URL=geolocalizacion:50051
    depends_on:
      - mosquitto

  geolocalizacion:
    image: node:20-alpine
    container_name: c5_geolocalizacion
    working_dir: /app
    volumes:
      - ./services/geolocalizacion:/app
      - /app/node_modules
    command: sh -c "npm install && node index.js"
    networks:
      - c5_network
    ports:
      - "50051:50051"

  prioridad:
    image: node:20-alpine
    container_name: c5_prioridad
    working_dir: /app
    volumes:
      - ./services/prioridad:/app
      - /app/node_modules
    command: sh -c "npm install && node index.js"
    networks:
      - c5_network
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  notificaciones:
    image: node:20-alpine
    container_name: c5_notificaciones
    working_dir: /app
    volumes:
      - ./services/notificaciones:/app
      - /app/node_modules
    command: sh -c "npm install && node index.js"
    networks:
      - c5_network
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  historial:
    image: node:20-alpine
    container_name: c5_historial
    working_dir: /app
    volumes:
      - ./services/historial:/app
      - /app/node_modules
    command: sh -c "npm install && node index.js"
    networks:
      - c5_network
    ports:
      - "4000:4000"
    environment:
      - DB_PRIMARY_URL=postgres://c5_admin:c5_secret@postgres-primary:5432/c5_alertas
      - DB_REPLICA_URL=postgres://c5_admin:c5_secret@postgres-replica:5432/c5_alertas
    depends_on:
      - postgres-primary
      - postgres-replica

  # ==========================================
  # FRONTEND (OPERADORES C5)
  # ==========================================
  
  frontend:
    image: node:20-alpine
    container_name: c5_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - c5_network
    ports:
      - "5173:5173" 
    environment:
      - VITE_WS_URL=ws://localhost:3000
    depends_on:
      - notificaciones

networks:
  c5_network:
    driver: bridge

volumes:
  pg_primary_data:
  pg_replica_data: