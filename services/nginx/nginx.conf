events { 
    worker_connections 1024; 
}

http {
    # MIDDLEWARE: RATE LIMITING (Protección contra saturación)
    limit_req_zone $binary_remote_addr zone=limit_api:10m rate=10r/s;

    # BALANCEADOR PARA EL MICROSERVICIO DE RECEPCIÓN
    upstream recepcion_backend {
        least_conn; # Balanceo por menor cantidad de conexiones activas
        
        # Declaración explícita de las instancias
        server recepcion-1:3000;
        server recepcion-2:3000;
        server recepcion-3:3000;
    }

    server {
        listen 80;

        # RUTA PRINCIPAL
        location / {
            proxy_pass http://recepcion_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # RUTA DE LA API CON REGLAS DE SEGURIDAD Y CORS
        location /api/recepcion/ {
            limit_req zone=limit_api burst=20 nodelay;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            proxy_pass http://recepcion_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}